      box-sizing: border-box;

    /* Fixed white flash and bottom margin bugs here */
    html, body {
      background-color: var(--bg) !important;

    /* Cleaned up glass effect for clarity */

      -webkit-box-align: center;

      background: rgba(11, 20, 38, 0.45) !important;

    .typing-indicator { display: inline-flex; align-items: center; gap: 4px; padding: 8px 16px; font-size: 12px; }
    .typing-dot { width: 6px; height: 6px; background: currentColor; border-radius: 50%; animation: typingBounce 1.4s infinite; }

    @keyframes pulseRecording { 0% { opacity: 0.6; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1.2); } }
    .recording-pulse { animation: pulseRecording 1s infinite; }
    .search-icon { background: none !important; backdrop-filter: none !important; border: none !important; padding: 8px !important; margin: 0 !important; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text); }
    
    .menu-overlay-container { position: fixed; inset: 0; z-index: 100000; pointer-events: auto; }

    .emoji-bar { position: absolute; padding: 6px 12px; display: flex; gap: 4px; }

    .action-menu { position: absolute; padding: 4px 0; min-width: 200px; }
    .action-menu .menu-item {
      display: flex; align-items: center; justify-content: space-between;

    }
    .action-menu .menu-item:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.1); }

    .emoji-picker-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 1000000; display: flex; align-items: center; justify-content: center; }
    .emoji-picker { padding: 20px; width: 310px; }
    .emoji-picker-header { text-align: center; font-size: 15px; font-weight: 800; color: var(--text); padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 12px; }
    .emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
    .emoji-grid-item { background: none; border: none; font-size: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1); }
    .emoji-grid-item:hover { transform: scale(1.25); }

    .light-input { padding: 16px 20px; font-size: 15px; font-weight: 600; width: 100%; }

<script>
  function updateVH() {
    const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    document.documentElement.style.setProperty('--vh', `${vh}px`);
    if (window.scrollY > 0) window.scrollTo(0, 0);
  }
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', updateVH);
    window.visualViewport.addEventListener('scroll', updateVH);
  } else {
    window.addEventListener('resize', updateVH);
  }
  updateVH();
</script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<script>window.FramerMotion = window.Motion;</script>

<script type="text/babel">
  const { useState, useEffect, useLayoutEffect, useRef, useContext, createContext, useCallback, memo, useMemo } = React;
  const { createRoot } = ReactDOM;
  const { motion, AnimatePresence } = window.FramerMotion;
  const { createClient } = supabase;

  const SB_URL = "https://xtdmegkgzhyjqomhwfsk.supabase.co";
  const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0ZG1lZ2tnemh5anFvbWh3ZnNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTk0ODcsImV4cCI6MjA4OTU3NTQ4N30.ItvZpVxoYz4r_KZibnLmcxHLQ48UaGmfxiGOYZfOLbE";
  const sb = createClient(SB_URL, SB_KEY);

  let _channel = null;
  let _typingChannel = null;
  const PAGE_SIZE = 30;
  const TYPING_DEBOUNCE = 1000;

  async function compressImage(file) {
    if (!file.type.startsWith('image/')) return file;
    const options = { maxSizeMB: 0.5, maxWidthOrHeight: 1024, useWebWorker: true };
    try { return await imageCompression(file, options); } catch(e) { return file; }
  }

  let recorder = null;
  async function startRecording() {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    recorder = new RecordRTC(stream, { type: 'audio', mimeType: 'audio/webm' });
    recorder.startRecording();
  }
  function stopRecording() {
    return new Promise((resolve) => {
      recorder.stopRecording(() => {
        const blob = recorder.getBlob();
        recorder.getStream().getTracks().forEach(track => track.stop());
        resolve(new File([blob], 'voice.webm', { type: 'audio/webm' }));
      });
    });
  }

  const Ctx = createContext(null);

  function AppProvider({ children }) {
    const [me, setMe] = useState("");
    const [meAvatar, setMeAvatar] = useState("");
    const [users, setUsers] = useState([]);
    const [avatars, setAvatars] = useState({});
    const [messages, setMessages] = useState([]);
    const [other, setOther] = useState("");
    const [otherAv, setOtherAv] = useState("");
    const [page, setPage] = useState(null);
    const [panel, setPanel] = useState(false);
    const [loading, setLoading] = useState(false);
    const [onlineUsers, setOnlineUsers] = useState([]);
    const [unreadCounts, setUnreadCounts] = useState({});
    const [hasMore, setHasMore] = useState(false);
    const [pageCount, setPageCount] = useState(1);
    const [appReady, setAppReady] = useState(false);
    const [accentColor, setAccentColor] = useState(localStorage.getItem("hw_accent") || "#3b82f6");
    const [searchQuery, setSearchQuery] = useState("");
    const [reactionsMap, setReactionsMap] = useState({});
    const [typingStatus, setTypingStatus] = useState(false);
    const [isRecording, setIsRecording] = useState(false);
    const [selectedSeenMsg, setSelectedSeenMsg] = useState(null);

    const meRef = useRef(me);
    const othRef = useRef(other);
    const typingTimeoutRef = useRef(null);

    useEffect(() => { document.documentElement.style.setProperty('--accent', accentColor); localStorage.setItem("hw_accent", accentColor); }, [accentColor]);
    useEffect(() => { meRef.current = me; }, [me]);
    useEffect(() => { othRef.current = other; }, [other]);

    const startRT = useCallback(() => {
      if (_channel) { sb.removeChannel(_channel); _channel = null; }
      _channel = sb.channel(`chat_${meRef.current}`, { config: { presence: { key: meRef.current } } })
        .on("postgres_changes", { event: "*", schema: "public", table: "messages" }, pl => {
          if (pl.eventType === "INSERT") {
            const newMsg = pl.new;
            if ((newMsg.sender === meRef.current && newMsg.receiver === othRef.current) ||
                (newMsg.sender === othRef.current && newMsg.receiver === meRef.current)) {
              
              setMessages(prev => { 
                if (prev.some(m => m.id === newMsg.id)) return prev; 
                // Fix for duplicate temp appends 
                if (newMsg.sender === meRef.current && prev.some(m => m.isTemp && m.content === newMsg.content)) return prev;
                return [...prev, newMsg]; 
              });
              
              if (newMsg.receiver === meRef.current && !newMsg.seen) { sb.from("messages").update({ seen: true, seen_at: new Date() }).eq("id", newMsg.id).then(); }
            } else if (newMsg.receiver === meRef.current) {
              setUnreadCounts(prev => ({ ...prev, [newMsg.sender]: (prev[newMsg.sender] || 0) + 1 }));
            }
          } else if (pl.eventType === "UPDATE") {
            setMessages(prev => prev.map(m => m.id === pl.new.id ? pl.new : m));
          } else if (pl.eventType === "DELETE") {
            setMessages(prev => prev.filter(m => m.id !== pl.old.id));
          }
        })
        .on("postgres_changes", { event: "*", schema: "public", table: "reactions" }, pl => {
          if (pl.eventType === "INSERT" || pl.eventType === "UPDATE") {
            setReactionsMap(prev => ({ ...prev, [pl.new.message_id]: { ...(prev[pl.new.message_id] || {}), [pl.new.user_id]: pl.new.reaction } }));
          } else if (pl.eventType === "DELETE") {
            setReactionsMap(prev => {
              const newMap = { ...prev };
              if (newMap[pl.old.message_id]) {
                const updatedMsgReactions = { ...newMap[pl.old.message_id] };
                delete updatedMsgReactions[pl.old.user_id];
                newMap[pl.old.message_id] = updatedMsgReactions;
              }
              return newMap;
            });
          }
        })
        .on("presence", { event: "sync" }, () => {
          const state = _channel.presenceState();
          setOnlineUsers(Object.keys(state));
        })
        .subscribe(async (status) => {
          if (status === 'SUBSCRIBED' && meRef.current) await _channel.track({ online: true });
        });
    }, []);

    useEffect(() => {
      const handleVisibilityChange = () => { if (document.visibilityState === 'visible' && othRef.current) { startRT(); } };
      document.addEventListener("visibilitychange", handleVisibilityChange);
      return () => document.removeEventListener("visibilitychange", handleVisibilityChange);
    }, [startRT]);

    const fetchReactionsForMessages = useCallback(async (msgIds) => {
      if (!msgIds || msgIds.length === 0) return;
      try {
        const { data, error } = await sb.from('reactions').select('*').in('message_id', msgIds);
        if (data) {
          const grouped = {};
          data.forEach(r => { if (!grouped[r.message_id]) grouped[r.message_id] = {}; grouped[r.message_id][r.user_id] = r.reaction; });
          setReactionsMap(prev => ({ ...prev, ...grouped }));
        }
      } catch(e) { console.error("Error fetching reactions block:", e); }
    }, []);

    const fetchReactions = useCallback(async (messageId) => {
      try {
        const { data, error } = await sb.from('reactions').select('*').eq('message_id', messageId);
        if (data) { const grouped = {}; data.forEach(r => { grouped[r.user_id] = r.reaction; }); setReactionsMap(prev => ({ ...prev, [messageId]: grouped })); }
      } catch(e) { console.error("Catch fetchReactions:", e); }
    }, []);

    const triggerPush = useCallback(async (text) => {
      try {
        fetch(`${SB_URL}/functions/v1/onesignal-notification-`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SB_KEY}`, 'apikey': SB_KEY }, body: JSON.stringify({ sender: meRef.current, receiver: othRef.current, content: text }) }).catch(err => console.error("Push error:", err));
      } catch (e) {}
    }, []);

    const addReaction = useCallback(async (messageId, reaction) => {
      if (!reaction) {
        await sb.from('reactions').delete().eq('message_id', messageId).eq('user_id', meRef.current);
      } else {
        const { error } = await sb.from('reactions').upsert({ message_id: messageId, user_id: meRef.current, reaction }, { onConflict: 'message_id,user_id' });
        if (!error) { fetchReactions(messageId); triggerPush(`Reacted ${reaction} to your message`); }
      }
      fetchReactions(messageId);
    }, [fetchReactions, triggerPush]);

    const sendTyping = useCallback(async (isTyping) => {
      if (!othRef.current) return;
      await sb.from('typing_status').upsert({ user_id: meRef.current, recipient: othRef.current, is_typing: isTyping, updated_at: new Date() }, { onConflict: 'user_id,recipient' });
    }, []);

    useEffect(() => {
      if (!other) return;
      if (_typingChannel) { sb.removeChannel(_typingChannel); _typingChannel = null; }
      _typingChannel = sb.channel('typing-status')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'typing_status', filter: `user_id=eq.${other} AND recipient=eq.${me}` }, (payload) => { setTypingStatus(payload.new?.is_typing || false); })
        .subscribe();
      return () => { if (_typingChannel) { sb.removeChannel(_typingChannel); _typingChannel = null; } };
    }, [other, me]);

    const triggerTyping = useCallback(() => {
      sendTyping(true);
      if (typingTimeoutRef.current) clearTimeout(typingTimeoutRef.current);
      typingTimeoutRef.current = setTimeout(() => sendTyping(false), TYPING_DEBOUNCE);
    }, [sendTyping]);

    const editMessage = useCallback(async (msgId, newContent) => {
      const { error } = await sb.from('messages').update({ content: newContent, edited: true }).eq('id', msgId);
      if (!error) await sb.from('message_edits').insert({ message_id: msgId, edited_content: newContent });
    }, []);

    const retryMessage = useCallback(async (msg) => {
      if (!msg.failed) return;
      const { error } = await sb.from('messages').update({ failed: false }).eq('id', msg.id);
      if (!error) setMessages(prev => prev.map(m => m.id === msg.id ? { ...m, failed: false } : m));
    }, []);

    const showReadReceipt = useCallback((msg) => {
      if (!msg.seen_at) return;
      setSelectedSeenMsg(msg);
      setTimeout(() => setSelectedSeenMsg(null), 3000);
    }, []);

    const sendMsg = useCallback(async (text, prefix = "") => {
      if (!text.trim() && !prefix) return;
      const msgContent = prefix + text;
      const tempId = 'temp_' + Date.now() + Math.random();
      const tempMsg = { id: tempId, content: msgContent, sender: meRef.current, receiver: othRef.current, seen: false, created_at: new Date().toISOString(), isTemp: true, failed: false };
      
      setMessages(prev => [...prev, tempMsg]);

      const { data, error } = await sb.from("messages").insert([{ content: msgContent, sender: meRef.current, receiver: othRef.current, seen: false, created_at: tempMsg.created_at, failed: false }]).select().single();
      if (error) { setMessages(prev => prev.map(m => m.id === tempId ? { ...m, failed: true, isTemp: false } : m)); } else { setMessages(prev => prev.map(m => m.id === tempId ? data : m)); triggerPush(text); }
    }, [triggerPush]);

    const uploadMedia = useCallback(async (file, prefix = "") => {
      if (!file) return;
      let processed = file;
      if (file.type.startsWith('image/')) processed = await compressImage(file);
      const name = Date.now() + "_" + processed.name;
      const { error: uploadError } = await sb.storage.from("chat-media").upload(name, processed);
      if (uploadError) return;
      const { data } = sb.storage.from("chat-media").getPublicUrl(name);
      const isImg = file.type.startsWith("image/");
      await sb.from("messages").insert([{ sender: meRef.current, receiver: othRef.current, content: prefix, [isImg ? "image" : "audio"]: data.publicUrl, created_at: new Date().toISOString() }]);
    }, []);

    const startVoiceRecord = useCallback(async () => { try { await startRecording(); setIsRecording(true); } catch(e) {} }, []);
    const stopVoiceRecord = useCallback(async () => { if (!isRecording) return; const audioFile = await stopRecording(); setIsRecording(false); await uploadMedia(audioFile, ""); }, [uploadMedia, isRecording]);

    const filteredMessages = useMemo(() => {
      if (!searchQuery) return messages;
      return messages.filter(m => m.content?.toLowerCase().includes(searchQuery.toLowerCase()));
    }, [messages, searchQuery]);

    const buildUsers = useCallback(async () => {
      if (!meRef.current) return;

      const { data: contactsData, error: contactsError } = await sb
        .from("contacts")
        .select("contact_username")
        .eq("owner_username", meRef.current);

      if (contactsError) {
        console.error("Error fetching contacts:", contactsError);
        return;
      }

      const contactList = contactsData.map(c => c.contact_username);

      if (contactList.length > 0) {
        const { data: userData, error: userError } = await sb
          .from("users")
          .select("*")
          .in("username", contactList);

        if (userData) {
          const av = {};
          userData.forEach(u => { av[u.username] = u.avatar_url || ""; });
          setUsers(userData);
          setAvatars(av);
        }
      } else {
        setUsers([]);
      }

      const { data: unreads } = await sb
        .from("messages")
        .select("sender")
        .eq("receiver", meRef.current)
        .eq("seen", false);
        
      if (unreads) {
        const counts = {};
        unreads.forEach(m => { counts[m.sender] = (counts[m.sender] || 0) + 1; });
        setUnreadCounts(counts);
      }
    }, []);


    const login = useCallback(async (username, password) => {
      setLoading(true);
      const { data } = await sb.from("users").select("*").eq("username", username).eq("password", password).maybeSingle();
      setLoading(false);
      if (data) {
        const av = data.avatar_url || "";
        localStorage.setItem("hw_me", data.username); localStorage.setItem("hw_meAvatar", av);
        setMe(data.username); setMeAvatar(av); setPage("list"); meRef.current = data.username;

    useEffect(() => {
      const t = setTimeout(() => setMinTimeElapsed(true), 600); 
      return () => clearTimeout(t);
    }, []);

    useEffect(() => {
      if (appReady && minTimeElapsed && page !== null) {
        setSplash(false);
      }
    }, [appReady, minTimeElapsed, page]);

    return (
      <div style={{ width: "100%", height: "100%", position: "absolute", inset: 0, overflow: "hidden" }}>
        <SplashScreen visible={splash} />
        <AnimatePresence mode="wait">
          {!splash && page === "login" && (
            <motion.div key="login" style={{ position: "absolute", inset: 0, zIndex: 1, WebkitBackfaceVisibility: "hidden", backfaceVisibility: "hidden" }} variants={PV} initial="initial" animate="animate" exit="exit">
              <LoginPage />
            </motion.div>
          )}
          {!splash && page === "list" && (
            <motion.div key="list" style={{ position: "absolute", inset: 0, zIndex: 1, WebkitBackfaceVisibility: "hidden", backfaceVisibility: "hidden" }} variants={PV} initial="initial" animate="animate" exit="exit">
              <ChatListPage />
            </motion.div>
          )}
          {!splash && page === "chat" && (
            <motion.div key="chat" style={{ position: "absolute", inset: 0, zIndex: 1, WebkitBackfaceVisibility: "hidden", backfaceVisibility: "hidden" }} variants={PV} initial="initial" animate="animate" exit="exit">
              <ChatBoxPage />
            </motion.div>
          )}
        </AnimatePresence>
      </div>
    );
  }

  createRoot(document.getElementById("root")).render(
    <AppProvider><App /></AppProvider>
  );
</script>
</body>
</html>
