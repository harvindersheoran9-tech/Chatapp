<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Harvinder Chat">

<link rel="apple-touch-icon" href="https://via.placeholder.com/180">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<style>
/* --- SHARED BASE STYLES --- */
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
body{
  margin:0;
  font-family:-apple-system;
  overflow:hidden;
  height:100vh;
  background:
  radial-gradient(circle at 50% 20%, #eef3f8 0%, transparent 60%),
  linear-gradient(to bottom, #dfe5ec 0%, #2b2f36 75%, #0a0c10 100%);
}

/* ✨ NAVIGATION & TRANSITIONS */
section { 
  display: none; 
  height: 100vh; 
  width: 100%; 
  position: absolute; 
  top: 0; 
  left: 0;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
}

section.active { 
  display: block; 
  opacity: 1; 
  transform: translateY(0);
}

/* ❄️ GLOBAL SNOW */
.snow{ position:fixed; inset:0; pointer-events:none; z-index: 9999; }
.flake{
  position:absolute; width:4px; height:4px; background:white;
  border-radius:50%; opacity:0.7; animation:fall linear infinite;
}
@keyframes fall{ from{transform:translateY(-10vh);} to{transform:translateY(110vh);} }

/* --- PAGE 1: LOGIN STYLES --- */
#loginScreen{ display:flex; justify-content:center; align-items:flex-start; padding-top:90px; }
.loginWrap{ width:100%; max-width:360px; padding:0 22px; text-align:center; }
.logoCircle{ width:120px; height:120px; margin:auto; border-radius:50%; position:relative; background: radial-gradient(circle at 25% 25%, rgba(255,255,255,0.95), transparent 40%), radial-gradient(circle at 70% 70%, rgba(200,210,220,0.5), transparent 60%), rgba(245,247,250,0.9); display:flex; align-items:center; justify-content:center; box-shadow: 0 30px 70px rgba(0,0,0,0.4), inset 0 12px 25px rgba(255,255,255,0.9), inset 0 -12px 25px rgba(150,160,180,0.4); }
.logoCircle::before{ content:""; position:absolute; inset:0; border-radius:50%; background-image: radial-gradient(rgba(255,255,255,0.5) 1px, transparent 1px); background-size:6px 6px; opacity:0.25; }
.logoSVG{ width:60px; opacity:0.7; }
.appName{ margin-top:18px; font-size:26px; font-weight:700; background:linear-gradient(90deg, #00c6ff, #ffd700, #ff5e62, #b16cea, #4facfe); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.loginCard{ margin-top:34px; padding:22px; border-radius:28px; background: linear-gradient(180deg, rgba(255,255,255,0.25), rgba(255,255,255,0.1)); backdrop-filter:blur(60px) saturate(160%); -webkit-backdrop-filter:blur(60px) saturate(160%); border:1px solid rgba(255,255,255,0.25); box-shadow: 0 40px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.6); display:flex; flex-direction:column; gap:14px; }
.loginCard input{ width:100%; padding:14px 16px; border-radius:18px; border:none; background:rgba(255,255,255,0.7); color:#000; font-size:14px; transition:0.3s; box-sizing:border-box; }
.loginCard input:focus{ outline:none; box-shadow: 0 0 0 2px rgba(120,170,255,0.4), 0 0 25px rgba(120,170,255,0.3); }
.loginBtn{ width:60%; margin:12px auto 0; padding:13px; border-radius:24px; border:none; background:rgba(120,170,255,0.95); color:white; font-weight:600; transition:0.3s; cursor: pointer;}
.loginBtn:hover{ box-shadow: 0 0 30px rgba(120,170,255,0.5); transform:scale(1.05); }

/* --- PAGE 2: LIST STYLES --- */
.container{ padding: max(20px, env(safe-area-inset-top)) 16px 20px; }
.header-list{ height:60px; padding:0 16px; border-radius:22px; display:flex; align-items:center; justify-content:space-between; background:rgba(255,255,255,0.22); backdrop-filter:blur(40px); box-shadow:0 15px 30px rgba(0,0,0,0.25); }
.logo-list{ width:80px; }
.settings{ width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.35); backdrop-filter:blur(20px); box-shadow: inset 0 2px 6px rgba(255,255,255,0.7), 0 8px 20px rgba(0,0,0,0.3); transition:0.2s; }
.settings svg{ width:22px; height:22px; stroke:#222; stroke-width:2.2; fill:none; }
.list{ margin-top:18px; display:flex; flex-direction:column; gap:14px; }
.chat-item{ display:flex; align-items:center; gap:12px; padding:14px; border-radius:20px; background:rgba(255,255,255,0.2); backdrop-filter:blur(30px); box-shadow:0 12px 25px rgba(0,0,0,0.3); cursor: pointer; transition: 0.3s;}
.chat-item:active{ transform: scale(0.96); opacity: 0.8; }
.avatar-list{ width:46px; height:46px; border-radius:50%; background:linear-gradient(135deg, #fff, #888); }
.text-list{flex:1;}
.name-list{ font-weight:600; color:#111; }
.msg-list{ font-size:13px; color:#555; }
.time-list{ font-size:12px; color:#777; }
.overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.35); backdrop-filter:blur(20px); opacity:0; pointer-events:none; transition:0.3s; z-index: 2000;}
.overlay.active{ opacity:1; pointer-events:auto; }
.panel{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.85); width:85%; max-width:320px; padding:18px; border-radius:24px; background:rgba(255,255,255,0.28); backdrop-filter:blur(60px); box-shadow:0 40px 80px rgba(0,0,0,0.5); opacity:0; transition:0.35s cubic-bezier(.2,.8,.2,1); z-index: 2001;}
.panel.active{ opacity:1; transform:translate(-50%,-50%) scale(1); }
.option{ padding:14px; border-radius:14px; font-size:15px; }
.logout{ margin-top:12px; padding:16px; border-radius:18px; text-align:center; background:rgba(255,255,255,0.6); backdrop-filter:blur(20px); font-weight:600; box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 10px 25px rgba(0,0,0,0.3); cursor: pointer;}

/* --- PAGE 3: CHATBOX STYLES --- */
.header-chat{ position:fixed; top:0; left:0; right:0; height:70px; display:flex; align-items:center; gap:10px; padding:0 14px; background:rgba(255,255,255,0.18); backdrop-filter:blur(30px); box-shadow: inset 0 1px 2px rgba(255,255,255,0.4), 0 4px 20px rgba(0,0,0,0.2); z-index:1000; transition: transform 0.3s ease; }
.avatar-chat{ width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#fff,#bbb); box-shadow:0 0 10px rgba(255,255,255,0.5); }
.chat-area{ position:fixed; top:80px; bottom:90px; left:0; right:0; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; -webkit-overflow-scrolling:touch; scroll-behavior:smooth; }
.msg-bubble{ max-width:70%; padding:12px 16px; border-radius:20px; position:relative; backdrop-filter:blur(20px); background:rgba(255,255,255,0.18); box-shadow: inset 0 1px 1px rgba(255,255,255,0.3), 0 8px 25px rgba(0,0,0,0.35); animation:pop 0.25s ease; color:#e8eef5;}
.msg-bubble::after{ content:""; position:absolute; inset:0; border-radius:inherit; background:linear-gradient(120deg, rgba(255,255,255,0.25), transparent 40% ); pointer-events:none; }
.msg-bubble.out{ margin-left:auto; background:linear-gradient( 145deg, rgba(120,160,255,0.7), rgba(80,120,255,0.6) ); color:white; box-shadow: inset 0 1px 2px rgba(255,255,255,0.4), 0 10px 30px rgba(79,140,255,0.6); }
@keyframes pop{ from{ opacity:0; transform:translateY(8px) scale(0.96); } to{ opacity:1; transform:translateY(0) scale(1); } }
.inputBar{ position:fixed; left:10px; right:10px; bottom:10px; display:flex; gap:10px; padding:10px; border-radius:22px; background:rgba(255,255,255,0.2); backdrop-filter:blur(25px); box-shadow: inset 0 1px 2px rgba(255,255,255,0.4), 0 10px 30px rgba(0,0,0,0.3); transition:transform 0.2s ease; z-index:200; }
.chat-input{ flex:1; padding:12px 14px; border:none; outline:none; border-radius:18px; background:rgba(255,255,255,0.25); backdrop-filter:blur(18px); box-shadow: inset 0 1px 2px rgba(255,255,255,0.5), 0 4px 15px rgba(0,0,0,0.2); }
.send-btn{ padding:12px 16px; border-radius:16px; background:rgba(120,160,255,0.8); color:white; font-weight:600; cursor: pointer;}
</style>
</head>
<body>

<div class="snow" id="snow"></div>

<section id="pageLogin" class="active" style="opacity:1; transform:none;">
  <div id="loginScreen">
    <div class="loginWrap">
      <div class="logoCircle">
        <svg class="logoSVG" viewBox="0 0 200 80">
          <path d="M30 40 L60 20 L90 40 L120 20 L150 40" stroke="#111" stroke-width="3" fill="none"/>
          <path d="M30 40 L60 60 L90 40 L120 60 L150 40" stroke="#111" stroke-width="3" fill="none"/>
        </svg>
      </div>
      <div class="appName">My World</div>
      <div class="loginCard">
        <input id="uField" placeholder="Username">
        <input id="pField" type="password" placeholder="Password">
        <button class="loginBtn" onclick="loginUser()">Login</button>
      </div>
    </div>
  </div>
</section>

<section id="pageList">
  <div class="container">
    <div class="header-list">
      <svg class="logo-list" viewBox="0 0 200 80">
        <defs><linearGradient id="g" x1="0%" y1="0%" x2="100%"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#222"/></linearGradient></defs>
        <path d="M30 40 L60 20 L90 40 L120 20 L150 40" stroke="rgba(255,255,255,0.5)" stroke-width="6" fill="none" filter="blur(2px)"/>
        <path d="M30 40 L60 60 L90 40 L120 60 L150 40" stroke="rgba(255,255,255,0.5)" stroke-width="6" fill="none" filter="blur(2px)"/>
        <path d="M30 40 L60 20 L90 40 L120 20 L150 40" stroke="url(#g)" stroke-width="4" fill="none"/>
        <path d="M30 40 L60 60 L90 40 L120 60 L150 40" stroke="url(#g)" stroke-width="4" fill="none"/>
      </svg>
      <div class="settings" onclick="openSettings()">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.3.7a7 7 0 0 0-1.7-1l-.3-2.5h-4l-.3 2.5a7 7 0 0 0-1.7 1l-2.3-.7-2 3.5 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.5 2.3-.7a7 7 0 0 0 1.7 1l.3 2.5h4l.3-2.5a7 7 0 0 0 1.7-1l2.3.7 2-3.5-2-1.5c.1-.3.1-.7.1-1z"/></svg>
      </div>
    </div>
    <div class="list" id="userChatList"></div>
  </div>
  <div class="overlay" id="overlay" onclick="closeSettings()"></div>
  <div class="panel" id="panel">
    <div class="logout" onclick="location.reload();">Logout</div>
  </div>
</section>

<section id="pageChatBox">
  <div class="header-chat" id="chatHeader">
    <div onclick="showPage('pageList')" style="cursor:pointer; font-size: 24px; padding: 0 10px;">←</div>
    <div class="avatar-chat"></div>
    <div><b id="chattingWithName">User</b></div>
  </div>
  <div class="chat-area" id="chatContent"></div>
  <div class="inputBar" id="chatInputBar">
    <input class="chat-input" id="messageInput" placeholder="Message...">
    <div class="send-btn" onclick="sendMessage()">Send</div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseUrl = "https://xtdmegkgzhyjqomhwfsk.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0ZG1lZ2tnemh5anFvbWh3ZnNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTk0ODcsImV4cCI6MjA4OTU3NTQ4N30.ItvZpVxoYz4r_KZibnLmcxHLQ48UaGmfxiGOYZfOLbE";
const client = supabase.createClient(supabaseUrl, supabaseKey);

/* 🔑 ACCOUNT DATA - AS REQUESTED */
const accounts = {
  "Harvinder": "1234",
  "Monika": "5678",
  "Sunita": "9999"
};

let me = "";
let other = "";
let channel = null;

/* 🚪 LOGIN LOGIC */
function loginUser(){
  const u = document.getElementById("uField").value.trim();
  const p = document.getElementById("pField").value.trim();

  if(accounts[u] && accounts[u] === p){
    me = u;
    buildChatList();
    showPage('pageList');
  } else {
    alert("Invalid Username or Password");
  }
}

function buildChatList() {
  const listDiv = document.getElementById("userChatList");
  listDiv.innerHTML = "";
  Object.keys(accounts).forEach(name => {
    if(name !== me) {
      const item = document.createElement("div");
      item.className = "chat-item";
      item.onclick = () => openChat(name);
      item.innerHTML = `
        <div class="avatar-list"></div>
        <div class="text-list">
          <div class="name-list">${name}</div>
          <div class="msg-list">Tap to message</div>
        </div>
        <div class="time-list">Now</div>
      `;
      listDiv.appendChild(item);
    }
  });
}

/* 💬 CHAT LOGIC */
function openChat(name){
  other = name;
  document.getElementById("chattingWithName").innerText = name;
  showPage('pageChatBox');
  loadMessages();
  realtime();
}

async function loadMessages(){
  const {data, error} = await client.from("messages")
    .select("*")
    .or(`and(sender.eq.${me},receiver.eq.${other}),and(sender.eq.${other},receiver.eq.${me})`)
    .order("id", {ascending: true});

  if(error) return;
  const chatContent = document.getElementById("chatContent");
  chatContent.innerHTML = "";
  data.forEach(m => {
    let div = document.createElement("div");
    div.className = "msg-bubble " + (m.sender === me ? "out" : "");
    div.textContent = m.content;
    chatContent.appendChild(div);
  });
  chatContent.scrollTop = chatContent.scrollHeight;
}

async function sendMessage(){
  let input = document.getElementById("messageInput");
  let val = input.value.trim();
  if(!val) return;
  const { error } = await client.from("messages").insert([{ content: val, sender: me, receiver: other }]);
  if(!error) input.value = "";
}

function realtime(){
  if(channel) client.removeChannel(channel);
  channel = client.channel("global")
    .on("postgres_changes", {event: "INSERT", schema: "public", table: "messages"}, payload => {
        let m = payload.new;
        if((m.sender === me && m.receiver === other) || (m.sender === other && m.receiver === me)){
          let div = document.createElement("div");
          div.className = "msg-bubble " + (m.sender === me ? "out" : "");
          div.textContent = m.content;
          document.getElementById("chatContent").appendChild(div);
          document.getElementById("chatContent").scrollTop = document.getElementById("chatContent").scrollHeight;
        }
    }).subscribe();
}

/* 🎬 UI NAVIGATION */
function showPage(pageId) {
  const allSections = document.querySelectorAll('section');
  const targetSection = document.getElementById(pageId);
  allSections.forEach(sec => {
    if(sec.classList.contains('active')) {
      sec.style.opacity = "0";
      sec.style.transform = "translateY(-10px)";
      setTimeout(() => { sec.classList.remove('active'); sec.style.display = "none"; }, 400);
    }
  });
  setTimeout(() => {
    targetSection.style.display = "block";
    targetSection.offsetHeight; 
    targetSection.classList.add('active');
    targetSection.style.opacity = "1";
    targetSection.style.transform = "translateY(0)";
  }, 400);
}

function openSettings(){ document.getElementById("panel").classList.add("active"); document.getElementById("overlay").classList.add("active"); }
function closeSettings(){ document.getElementById("panel").classList.remove("active"); document.getElementById("overlay").classList.remove("active"); }

/* SNOW */
const snowContainer = document.getElementById("snow");
for(let i=0;i<45;i++){
  let f=document.createElement("div");
  f.className="flake";
  f.style.left=Math.random()*100+"vw";
  f.style.animationDuration=(5+Math.random()*6)+"s";
  snowContainer.appendChild(f);
}
</script>
</body>
</html>
