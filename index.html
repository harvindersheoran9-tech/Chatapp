<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Harvinder Chat">

<link rel="apple-touch-icon" href="https://via.placeholder.com/180">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<style>
/* --- ALL UI STYLES INTEGRATED --- */
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-font-smoothing: antialiased;}
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  overflow:hidden;
  height:100vh;
  background: #000;
}

/* --- TIDE THEME FOR CHATLIST & CHATBOX --- */
#pageList, #pageChatBox {
  background: linear-gradient(to bottom, #949ca5 0%, #b8babd 30%, #e8c9ba 60%, #94a3b8 100%) !important;
  background-attachment: fixed;
}

#pageList::before, #pageChatBox::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(to bottom, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0.05) 100%);
    pointer-events: none;
}

section { 
  display: none; 
  height: 100vh; 
  width: 100%; 
  position: absolute; 
  top: 0; 
  left: 0; 
  opacity: 0; 
  transform: translateY(10px); 
  transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); 
  will-change: transform, opacity;
}
section.active { 
  display: block; 
  opacity: 1; 
  transform: translateY(0);
}

/* --- LOGIN PAGE --- */
#pageLogin {
    background: #e0e5ec; /* Standard Neumorphic Background Color */
}
#loginScreen{ display:flex; justify-content:center; align-items:flex-start; padding-top:90px; }
.loginWrap{ width:100%; max-width:360px; padding:0 22px; text-align:center; }
.logoWrapper { position: relative; width: 180px; height: 180px; margin: auto; display: flex; align-items: center; justify-content: center; }
.orbitRing { position: absolute; width: 170px; height: 170px; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 50%; pointer-events: none; }
.logoCircle{ width:120px; height:120px; border-radius:50%; position:relative; z-index: 2; background: #e0e5ec; display:flex; align-items:center; justify-content:center; box-shadow: 9px 9px 16px rgb(163,177,198,0.6), -9px -9px 16px rgba(255,255,255, 0.5); transform: translateZ(0); }
.orbitDot { position: absolute; width: 6px; height: 6px; background: white; border-radius: 50%; box-shadow: 0 0 10px rgba(255,255,255,0.8); z-index: 1; will-change: transform; }
.dot1 { animation: orbitPath1 4s linear infinite; }
.dot2 { animation: orbitPath2 6s linear infinite; }
.dot3 { animation: orbitPath3 5s linear infinite; }
@keyframes orbitPath1 { from { transform: rotate(0deg) translateX(72px) rotate(0deg); } to { transform: rotate(360deg) translateX(72px) rotate(-360deg); } }
@keyframes orbitPath2 { from { transform: rotate(120deg) translateX(80px) rotate(-120deg); } to { transform: rotate(480deg) translateX(80px) rotate(-480deg); } }
@keyframes orbitPath3 { from { transform: rotate(240deg) translateX(65px) rotate(-240deg); } to { transform: rotate(-120deg) translateX(65px) rotate(120deg); } }
.logoSVG{ width:60px; opacity:0.7; }
.appName { margin-top: 18px; font-size: 32px; font-weight: 900; display: flex; justify-content: center; color: #4d547d; }
.appName span { display: inline-block; position: relative; animation: flyAroundOrbit 10s cubic-bezier(0.4, 0, 0.2, 1) infinite; will-change: transform; }
@keyframes flyAroundOrbit { 0% { transform: translate(0, 0) rotate(0deg); } 10% { transform: translate(0, -100px) scale(0.8); } 30% { transform: translate(0, -100px) rotate(360deg) translateX(90px) rotate(-360deg); } 50%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); } }

/* LOGIN CARD & INPUTS UPDATED TO NEUMORPHIC */
.loginCard{ margin-top:34px; padding:22px; border-radius:28px; display:flex; flex-direction:column; gap:20px; }

.loginCard input{ 
  width:100%; 
  padding:16px 20px; 
  border-radius:20px; 
  border:none; 
  outline:none;
  background: #e0e5ec; 
  color: #4d547d; 
  font-size:15px; 
  box-shadow: inset 6px 6px 12px #b8bec5, inset -6px -6px 12px #ffffff;
  transition: 0.3s; 
}
.loginCard input::placeholder { color: #a3b1c6; }

/* LOGIN BUTTON UPDATED TO NEUMORPHIC */
.loginBtn{ 
  width:80%; 
  margin:15px auto 0; 
  padding:15px; 
  border-radius:20px; 
  border:none; 
  background: #e0e5ec; 
  color: #4d547d; 
  font-weight:700; 
  font-size:16px;
  cursor: pointer; 
  box-shadow: 7px 7px 15px #b8bec5, -7px -7px 15px #ffffff;
  transition: all 0.2s ease; 
}
.loginBtn:active {
  box-shadow: inset 4px 4px 8px #b8bec5, inset -4px -4px 8px #ffffff;
  transform: scale(0.98);
}


/* --- DESIGN FIXES --- */
.container{ padding: max(20px, env(safe-area-inset-top)) 16px 20px; position: relative; z-index: 1;}

.header-list{ 
  height:75px; padding:0 20px; border-radius:35px; display:flex; 
  align-items:center; justify-content:space-between; 
  background: rgba(255, 255, 255, 0.25); 
  backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); 
  border: 1px solid rgba(255, 255, 255, 0.4); 
  box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
  margin-bottom: 25px; 
}

.chat-item{ 
  display:flex; align-items:center; gap:12px; padding:16px; border-radius:30px; 
  background: rgba(255, 255, 255, 0.25); 
  backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
  margin-bottom:12px; cursor:pointer; 
  border: 1px solid rgba(255, 255, 255, 0.4); 
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
  transition: transform 0.2s ease;
}
.chat-item:active { transform: scale(0.98); }

.header-chat{ 
  position:fixed; top:0; left:0; right:0; padding-top: env(safe-area-inset-top); 
  height: calc(75px + env(safe-area-inset-top)); display:flex; align-items:center; 
  gap:10px; padding: 0 18px; z-index:1000; 
  background: rgba(255, 255, 255, 0.25); 
  backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); 
  border-bottom: 1px solid rgba(255, 255, 255, 0.3);
}

.inputBar{ 
  position:fixed; left:16px; right:16px; bottom: 20px; 
  display:flex; align-items: center; gap:8px; padding:10px 16px; z-index:1001; 
  border-radius:30px; 
  background: rgba(255, 255, 255, 0.3); 
  backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); 
  border: 1px solid rgba(255, 255, 255, 0.4); 
  box-shadow: 0 15px 35px rgba(0,0,0,0.1);
}

.chat-area{ 
  position:fixed; top: calc(85px + env(safe-area-inset-top)); bottom: 100px; 
  left:0; right:0; overflow-y:auto; padding:16px; 
  display:flex; flex-direction:column; gap:12px; 
}

.msg-bubble{ 
  max-width:75%; padding:14px 18px; border-radius:22px; 
  background: rgba(255, 255, 255, 0.4); 
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
  color: #333; 
  border: 1px solid rgba(255, 255, 255, 0.4);
  box-shadow: 0 4px 15px rgba(0,0,0,0.03);
}
.msg-bubble.out{ 
  margin-left:auto; 
  background: rgba(255, 255, 255, 0.7); 
  color: #000;
  border: 1px solid rgba(255, 255, 255, 0.6);
}

.chat-input{ flex:1; padding:10px 14px; border:none; outline:none; border-radius:20px; background:rgba(255,255,255,0.3); color: #000;}
.chat-input::placeholder { color: rgba(0,0,0,0.4); }

.logoSmall {
    width: 44px; height: 44px; border-radius: 50%;
    background: white; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.settings{ 
    width:40px; height:40px; border-radius:50%; 
    background:rgba(255,255,255,0.3); 
    border: 1px solid rgba(255,255,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}
.settings svg{ stroke:#444; width:22px; height:22px; }

/* PANEL & OVERLAY */
.overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.2); backdrop-filter:blur(10px); opacity:0; pointer-events:none; z-index: 2000; transition:0.3s; display: none; }
.overlay.active{ opacity:1; pointer-events:auto; display: block; }
.panel{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.9); width:85%; max-width:320px; padding:25px; border-radius:35px; background: rgba(255, 255, 255, 0.85); backdrop-filter:blur(50px); -webkit-backdrop-filter:blur(50px); border: 1px solid #fff; box-shadow: 0 30px 60px rgba(0,0,0,0.15); opacity:0; pointer-events: none; transition:0.3s; z-index: 2001; display: none; }
.panel.active{ opacity:1; transform:translate(-50%,-50%) scale(1); pointer-events: auto; display: block;}
.profile-edit input { background: rgba(0,0,0,0.05); color: #000; border: none; width: 100%; padding: 12px; border-radius: 12px; margin-bottom: 10px; }
.profile-edit label { color: #666; font-size: 13px; margin-bottom: 4px; display: block; }
</style>
</head>
<body>

<section id="pageLogin"> <div id="loginScreen">
    <div class="loginWrap">
      <div class="logoWrapper">
        <div class="orbitRing"></div>
        <div class="orbitDot dot1"></div>
        <div class="orbitDot dot2"></div>
        <div class="orbitDot dot3"></div>
        <div class="logoCircle">
          <svg class="logoSVG" viewBox="0 0 200 80"><path d="M30 40 L60 20 L90 40 L120 20 L150 40" stroke="#4d547d" stroke-width="3" fill="none"/><path d="M30 40 L60 60 L90 40 L120 60 L150 40" stroke="#4d547d" stroke-width="3" fill="none"/></svg>
        </div>
      </div>
      <div class="appName">
        <span>M</span><span>y</span><span style="width:10px;"></span><span>W</span><span>o</span><span>r</span><span>l</span><span>d</span>
      </div>
      <div class="loginCard">
        <input id="uField" placeholder="Username">
        <input id="pField" type="password" placeholder="Password">
        <button class="loginBtn" onclick="loginUser()">Sign In</button>
      </div>
    </div>
  </div>
</section>

<section id="pageList">
  <div class="container" id="listContainer">
    <div class="header-list">
      <div class="logoSmall">
          <svg viewBox="0 0 200 80" style="width:24px"><path d="M30 40 L60 20 L90 40 L120 20 L150 40" stroke="#111" stroke-width="8" fill="none"/><path d="M30 40 L60 60 L90 40 L120 60 L150 40" stroke="#111" stroke-width="8" fill="none"/></svg>
      </div>
      <div style="font-weight: 700; color: #444; font-size: 18px; flex: 1; text-align: center;">Messages</div>
      <div class="settings" onclick="openSettings()"><svg viewBox="0 0 24 24" style="fill:none; stroke-width:2.5;"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.3.7a7 7 0 0 0-1.7-1l-.3-2.5h-4l-.3 2.5a7 7 0 0 0-1.7 1l-2.3-.7-2 3.5 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.5 2.3-.7a7 7 0 0 0 1.7 1l.3 2.5h4l.3-2.5a7 7 0 0 0 1.7-1l2.3.7 2-3.5-2-1.5c.1-.3.1-.7.1-1z"/></svg></div>
    </div>
    <div class="list" id="userChatList"></div>
  </div>
  <div class="overlay" id="overlay" onclick="closeSettings()"></div>
  <div class="panel" id="panel">
    <div class="profile-edit">
        <label>Update Name</label>
        <input id="editName" placeholder="New Name...">
        <label>Change Password</label>
        <input id="editPass" type="password" placeholder="New Password...">
        <label>Update Photo</label>
        <input type="file" id="editAvatar" accept="image/*" style="border:none; background:transparent; font-size:11px; padding:5px 0;">
        <div class="loginBtn" style="width:100%; margin-top:15px; text-align:center;" onclick="updateProfile()">Save Profile</div>
    </div>
    <div class="logout-frosted" onclick="logoutUser()" style="color: #ff3b30; text-align: center; margin-top: 15px; font-weight: 600; cursor: pointer;">Logout</div>
  </div>
</section>

<section id="pageChatBox">
  <div class="header-chat" id="chatHeader">
    <div onclick="showPage('pageList')" style="cursor:pointer; font-size: 24px; color: #444; padding-right: 10px;">←</div>
    <div class="avatar-chat" id="headerAvatar" style="width:36px; height:36px; border-radius:50%; background-size:cover;"></div>
    <div><b id="chattingWithName" style="color: #333;">User</b></div>
  </div>
  <div class="chat-area" id="chatContent"></div>
  <div class="inputBar" id="chatInputBar">
    <label style="font-size:20px; cursor:pointer;" for="fileInput">📎</label>
    <input type="file" id="fileInput" hidden accept="image/*,audio/*" onchange="uploadMedia(this)">
    <input class="chat-input" id="messageInput" placeholder="Message...">
    <div class="send-btn" onclick="sendMessage()" style="color: #007aff; font-weight: 600;">Send</div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* LOGIC REMAINS COMPLETELY UNTOUCHED AS REQUESTED */
const supabaseUrl = "https://xtdmegkgzhyjqomhwfsk.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0ZG1lZ2tnemh5anFvbWh3ZnNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTk0ODcsImV4cCI6MjA4OTU3NTQ4N30.ItvZpVxoYz4r_KZibnLmcxHLQ48UaGmfxiGOYZfOLbE";
const client = supabase.createClient(supabaseUrl, supabaseKey);

let me = "", other = "", channel = null, userAvatars = {};

if (window.visualViewport) {
  const syncLayout = () => {
    const header = document.getElementById("chatHeader");
    const inputBar = document.getElementById("chatInputBar");
    const keyboardOffset = window.innerHeight - window.visualViewport.height;
    header.style.top = `${window.visualViewport.offsetTop}px`;
    inputBar.style.transform = `translateY(-${keyboardOffset}px) translateZ(0)`;
  };
  window.visualViewport.addEventListener('resize', syncLayout);
  window.visualViewport.addEventListener('scroll', syncLayout);
}

async function askPermission() { if ("Notification" in window) await Notification.requestPermission(); }
function notify(sender, text) {
  if (Notification.permission === "granted") {
    const options = { body: text, icon: userAvatars[sender] || "https://via.placeholder.com/180" };
    if (navigator.serviceWorker && navigator.serviceWorker.controller) {
      navigator.serviceWorker.ready.then(reg => reg.showNotification(`New message: ${sender}`, options));
    } else { new Notification(`Message from ${sender}`, options); }
  }
}

async function loginUser(){
  await askPermission(); 
  const u = document.getElementById("uField").value.trim();
  const p = document.getElementById("pField").value.trim();
  if(!u || !p) return alert("Fill all fields");
  const { data } = await client.from('users').select('*').eq('username', u).eq('password', p).maybeSingle();
  if(data){ 
    me = data.username; 
    localStorage.setItem("loggedInUser", me); 
    await buildChatList(); 
    showPage('pageList'); 
  } else { alert("Invalid Username or Password"); }
}

async function buildChatList() {
  const { data: allUsers } = await client.from('users').select('*');
  const listDiv = document.getElementById("userChatList");
  listDiv.innerHTML = "";
  if(allUsers) {
    allUsers.forEach(u => {
      userAvatars[u.username] = u.avatar_url || "https://via.placeholder.com/50";
      if(u.username !== me) {
        const item = document.createElement("div");
        item.className = "chat-item";
        item.onclick = () => openChat(u.username);
        item.innerHTML = `<div class="avatar-list" style="background-image: url('${userAvatars[u.username]}'); width:50px; height:50px; border-radius:50%; background-size:cover; border: 2px solid white;"></div><div><div style="color:#333; font-weight:600;">${u.username}</div><div style="color:rgba(0,0,0,0.4); font-size:12px;">Tap to message</div></div>`;
        listDiv.appendChild(item);
      }
    });
  }
}

async function openChat(name){
  other = name;
  document.getElementById("chattingWithName").innerText = name;
  document.getElementById("headerAvatar").style.backgroundImage = `url('${userAvatars[name]}')`;
  showPage('pageChatBox');
  loadMessages();
  realtime();
}

async function loadMessages(){
  const {data} = await client.from("messages").select("*").or(`and(sender.eq.${me},receiver.eq.${other}),and(sender.eq.${other},receiver.eq.${me})`).order("id", {ascending: true});
  const chatContent = document.getElementById("chatContent");
  chatContent.innerHTML = "";
  if(data) data.forEach(m => chatContent.appendChild(createMsgBubble(m)));
  chatContent.scrollTop = chatContent.scrollHeight;
}

function createMsgBubble(m) {
  let div = document.createElement("div");
  div.className = "msg-bubble " + (m.sender === me ? "out" : "");
  let html = `<div>${m.content || ''}</div>`;
  if (m.image) html += `<img src="${m.image}" class="chat-img" onclick="window.open('${m.image}')" style="max-width:100%; border-radius:12px; margin-top:5px;">`;
  if (m.audio) html += `<audio controls style="width:100%; height:30px; margin-top:5px;"><source src="${m.audio}"></audio>`;
  div.innerHTML = html;
  return div;
}

async function sendMessage(){
  let input = document.getElementById("messageInput");
  let val = input.value.trim();
  if(!val) return;
  await client.from("messages").insert([{ content: val, sender: me, receiver: other, seen: false }]);
  input.value = "";
}

async function uploadMedia(input) {
  const file = input.files[0];
  if (!file) return;
  const fileName = `${Date.now()}_${file.name}`;
  await client.storage.from('chat-media').upload(fileName, file);
  const { data } = client.storage.from('chat-media').getPublicUrl(fileName);
  const isImg = file.type.startsWith('image/');
  await client.from("messages").insert([{ sender: me, receiver: other, [isImg ? 'image' : 'audio']: data.publicUrl, content: "" }]);
}

async function updateProfile() {
    const avatarFile = document.getElementById("editAvatar").files[0];
    const newName = document.getElementById("editName").value.trim();
    const newPass = document.getElementById("editPass").value.trim();
    let updates = {};
    if(newName) updates.username = newName;
    if(newPass) updates.password = newPass;
    if(avatarFile) {
        const filePath = `avatars/${me}_${Date.now()}.png`;
        await client.storage.from('chat-media').upload(filePath, avatarFile);
        const { data } = client.storage.from('chat-media').getPublicUrl(filePath);
        updates.avatar_url = data.publicUrl;
    }
    const { error } = await client.from('users').update(updates).eq('username', me);
    if(!error) { alert("Profile Updated!"); location.reload(); }
}

function realtime(){
  if(channel) client.removeChannel(channel);
  channel = client.channel("room").on("postgres_changes", {event: "INSERT", schema: "public", table: "messages"}, payload => {
    const m = payload.new;
    if((m.sender === me && m.receiver === other) || (m.sender === other && m.receiver === me)){
      document.getElementById("chatContent").appendChild(createMsgBubble(m));
      document.getElementById("chatContent").scrollTop = document.getElementById("chatContent").scrollHeight;
    }
    if (m.receiver === me && (document.hidden || other !== m.sender)) notify(m.sender, m.content || "Sent a file");
  }).subscribe();
}

function showPage(id, skipAnim = false) {
  const sections = document.querySelectorAll('section');
  const target = document.getElementById(id);
  sections.forEach(s => { 
    if(s.classList.contains('active')){ 
      s.classList.remove('active'); s.style.display="none";
    }
  });
  requestAnimationFrame(() => {
    if(target) {
      target.style.display="block";
      target.offsetHeight;
      target.classList.add('active');
      target.style.opacity="1";
      target.style.transform = "translateY(0) translateZ(0)";
    }
  });
}

function openSettings(){ 
  document.getElementById("panel").classList.add("active"); 
  document.getElementById("overlay").classList.add("active"); 
}
function closeSettings(){ 
  document.getElementById("panel").classList.remove("active"); 
  document.getElementById("overlay").classList.remove("active"); 
}
function logoutUser() { localStorage.clear(); location.reload(); }

window.onload = async () => {
  const savedUser = localStorage.getItem("loggedInUser");
  if(savedUser) { 
    me = savedUser; 
    await buildChatList(); 
    showPage('pageList', true); 
    realtime(); 
  } else { showPage('pageLogin', true); }
};
</script>
</body>
</html>
