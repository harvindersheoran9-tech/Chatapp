<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Harvinder Chat">

<link rel="apple-touch-icon" href="https://via.placeholder.com/180">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<style>
/* --- ALL ORIGINAL UI STYLES UNCHANGED --- */
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
body{
  margin:0;
  font-family:-apple-system;
  overflow:hidden;
  height:100vh;
  background:
  radial-gradient(circle at 50% 20%, #eef3f8 0%, transparent 60%),
  linear-gradient(to bottom, #dfe5ec 0%, #2b2f36 75%, #0a0c10 100%);
}
section { display: none; height: 100vh; width: 100%; position: absolute; top: 0; left: 0; opacity: 0; transform: translateY(10px); transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
section.active { display: block; opacity: 1; transform: translateY(0); }
.snow{ position:fixed; inset:0; pointer-events:none; z-index: 9999; }
.flake{ position:absolute; width:4px; height:4px; background:white; border-radius:50%; opacity:0.7; animation:fall linear infinite; }
@keyframes fall{ from{transform:translateY(-10vh);} to{transform:translateY(110vh);} }
#loginScreen{ display:flex; justify-content:center; align-items:flex-start; padding-top:90px; }
.loginWrap{ width:100%; max-width:360px; padding:0 22px; text-align:center; }
.logoCircle{ width:120px; height:120px; margin:auto; border-radius:50%; position:relative; background: radial-gradient(circle at 25% 25%, rgba(255,255,255,0.95), transparent 40%), radial-gradient(circle at 70% 70%, rgba(200,210,220,0.5), transparent 60%), rgba(245,247,250,0.9); display:flex; align-items:center; justify-content:center; box-shadow: 0 30px 70px rgba(0,0,0,0.4), inset 0 12px 25px rgba(255,255,255,0.9), inset 0 -12px 25px rgba(150,160,180,0.4); }
.logoSVG{ width:60px; opacity:0.7; }
.appName{ margin-top:18px; font-size:26px; font-weight:700; background:linear-gradient(90deg, #00c6ff, #ffd700, #ff5e62, #b16cea, #4facfe); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.loginCard{ margin-top:34px; padding:22px; border-radius:28px; background: linear-gradient(180deg, rgba(255,255,255,0.25), rgba(255,255,255,0.1)); backdrop-filter:blur(60px) saturate(160%); -webkit-backdrop-filter:blur(60px) saturate(160%); border:1px solid rgba(255,255,255,0.25); box-shadow: 0 40px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.6); display:flex; flex-direction:column; gap:14px; }
.loginCard input{ width:100%; padding:14px 16px; border-radius:18px; border:none; background:rgba(255,255,255,0.7); color:#000; font-size:14px; }
.loginBtn{ width:60%; margin:12px auto 0; padding:13px; border-radius:24px; border:none; background:rgba(120,170,255,0.95); color:white; font-weight:600; cursor: pointer;}
.container{ padding: max(20px, env(safe-area-inset-top)) 16px 20px; }
.header-list{ height:60px; padding:0 16px; border-radius:22px; display:flex; align-items:center; justify-content:space-between; background:rgba(255,255,255,0.22); backdrop-filter:blur(40px); }
.settings{ width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.35); cursor:pointer;}
.settings svg{ width:22px; height:22px; stroke:#222; fill:none; stroke-width:2.2;}
.chat-item{ display:flex; align-items:center; gap:12px; padding:14px; border-radius:20px; background:rgba(255,255,255,0.2); backdrop-filter:blur(30px); margin-bottom:14px; cursor:pointer;}
.avatar-list{ width:46px; height:46px; border-radius:50%; background-size: cover; border: 2px solid white; }

/* 🛠️ FIXED HEADER: Added will-change for smooth movement */
.header-chat{ position:fixed; top:0; left:0; right:0; padding-top: env(safe-area-inset-top); height: calc(70px + env(safe-area-inset-top)); display:flex; align-items:center; gap:10px; padding: 0 14px; background:rgba(255,255,255,0.18); backdrop-filter:blur(30px); z-index:1000; will-change: transform; }

.avatar-chat{ width:36px; height:36px; border-radius:50%; background-size: cover; }
.chat-area{ position:fixed; top: calc(75px + env(safe-area-inset-top)); bottom: 85px; left:0; right:0; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }

.msg-bubble{ max-width:70%; width: fit-content; padding:12px 16px; border-radius:20px; backdrop-filter:blur(20px); background:rgba(255,255,255,0.18); color:#e8eef5; }
.msg-bubble.out{ margin-left:auto; background:linear-gradient(145deg, rgba(120,160,255,0.7), rgba(80,120,255,0.6)); color:white; }

.inputBar{ position:fixed; left:10px; right:10px; bottom: 10px; display:flex; align-items: center; gap:8px; padding:8px 12px; border-radius:22px; background:rgba(255,255,255,0.2); backdrop-filter:blur(25px); z-index:1001; will-change: transform; }
.chat-input{ flex:1; padding:10px 14px; border:none; outline:none; border-radius:18px; background:rgba(255,255,255,0.25); color: white;}
.send-btn{ padding:10px 14px; border-radius:16px; background:rgba(120,170,255,0.8); color:white; font-weight:600; cursor: pointer;}
.overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.35); backdrop-filter:blur(20px); opacity:0; pointer-events:none; z-index: 2000; transition:0.3s;}
.overlay.active{ opacity:1; pointer-events:auto; }
.panel{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.85); width:85%; max-width:320px; padding:18px; border-radius:24px; background:rgba(255,255,255,0.25); backdrop-filter:blur(50px); border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 25px 50px rgba(0,0,0,0.3); opacity:0; transition:0.35s; z-index: 2001;}
.panel.active{ opacity:1; transform:translate(-50%,-50%) scale(1); }
.chat-img { width: 100%; border-radius: 12px; margin-top: 5px; }
.seen-tick { font-size: 10px; float: right; margin-left: 5px; opacity: 0.8; }
.profile-edit input { width: 100%; padding: 12px; border-radius: 14px; border: none; background: rgba(255,255,255,0.5); margin-top: 8px; color: #000; outline: none;}

.logout-frosted {
    margin-top: 15px;
    padding: 12px;
    border-radius: 16px;
    text-align: center;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #ffffff;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
}
.logout-frosted:active { transform: scale(0.95); background: rgba(0, 0, 0, 0.6); }
</style>
</head>
<body>

<div class="snow" id="snow"></div>

<section id="pageLogin" class="active">
  <div id="loginScreen">
    <div class="loginWrap">
      <div class="logoCircle"><svg class="logoSVG" viewBox="0 0 200 80"><path d="M30 40 L60 20 L90 40 L120 20 L150 40" stroke="#111" stroke-width="3" fill="none"/><path d="M30 40 L60 60 L90 40 L120 60 L150 40" stroke="#111" stroke-width="3" fill="none"/></svg></div>
      <div class="appName">My World</div>
      <div class="loginCard">
        <input id="uField" placeholder="Username">
        <input id="pField" type="password" placeholder="Password">
        <button class="loginBtn" onclick="loginUser()">Login</button>
      </div>
    </div>
  </div>
</section>

<section id="pageList">
  <div class="container">
    <div class="header-list">
        <div style="font-weight:bold; color:white; font-size:18px;">Chats</div>
      <div class="settings" onclick="openSettings()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.3.7a7 7 0 0 0-1.7-1l-.3-2.5h-4l-.3 2.5a7 7 0 0 0-1.7 1l-2.3-.7-2 3.5 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.5 2.3-.7a7 7 0 0 0 1.7 1l.3 2.5h4l.3-2.5a7 7 0 0 0 1.7-1l2.3.7 2-3.5-2-1.5c.1-.3.1-.7.1-1z"/></svg></div>
    </div>
    <div class="list" id="userChatList"></div>
  </div>
  <div class="overlay" id="overlay" onclick="closeSettings()"></div>
  <div class="panel" id="panel">
    <div class="profile-edit">
        <label style="color:#222; font-weight:600; font-size:13px;">Update Name</label>
        <input id="editName" placeholder="New Name...">
        <label style="display:block; margin-top:10px; color:#222; font-weight:600; font-size:13px;">Change Password</label>
        <input id="editPass" type="password" placeholder="New Password...">
        <label style="display:block; margin-top:10px; color:#222; font-weight:600; font-size:13px;">Update Photo</label>
        <input type="file" id="editAvatar" accept="image/*" style="border:none; background:transparent; font-size:11px; padding:5px 0;">
        <div class="loginBtn" style="width:100%; margin-top:15px; text-align:center;" onclick="updateProfile()">Save Profile</div>
    </div>
    <div class="logout-frosted" onclick="logoutUser()">Logout</div>
  </div>
</section>

<section id="pageChatBox">
  <div class="header-chat" id="chatHeader">
    <div onclick="showPage('pageList')" style="cursor:pointer; font-size: 24px; color: white;">←</div>
    <div class="avatar-chat" id="headerAvatar"></div>
    <div><b id="chattingWithName" style="color: white;">User</b></div>
  </div>
  <div class="chat-area" id="chatContent"></div>
  <div class="inputBar" id="chatInputBar">
    <label style="font-size:20px; cursor:pointer;" for="fileInput">📎</label>
    <input type="file" id="fileInput" hidden accept="image/*,audio/*" onchange="uploadMedia(this)">
    <input class="chat-input" id="messageInput" placeholder="Message...">
    <div class="send-btn" onclick="sendMessage()">Send</div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseUrl = "https://xtdmegkgzhyjqomhwfsk.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0ZG1lZ2tnemh5anFvbWh3ZnNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTk0ODcsImV4cCI6MjA4OTU3NTQ4N30.ItvZpVxoYz4r_KZibnLmcxHLQ48UaGmfxiGOYZfOLbE";
const client = supabase.createClient(supabaseUrl, supabaseKey);

let me = "", other = "", channel = null, userAvatars = {};

/* 🛠️ IMPROVED VIEWPORT LOGIC: Fixes Header going Upward */
if (window.visualViewport) {
  const syncLayout = () => {
    const header = document.getElementById("chatHeader");
    const inputBar = document.getElementById("chatInputBar");
    
    // Calculate how much the viewport shifted up (keyboard height)
    const keyboardOffset = window.innerHeight - window.visualViewport.height;
    
    // Header MUST follow the offsetTop of the viewport to stay visible at the top
    header.style.transform = `translateY(${window.visualViewport.offsetTop}px)`;
    
    // Input bar must go UP by the keyboard height
    inputBar.style.transform = `translateY(-${keyboardOffset}px)`;
  };

  window.visualViewport.addEventListener('resize', syncLayout);
  window.visualViewport.addEventListener('scroll', syncLayout);
}

async function loginUser(){
  const u = document.getElementById("uField").value.trim();
  const p = document.getElementById("pField").value.trim();
  const { data } = await client.from('users').select('*').eq('username', u).eq('password', p).single();
  if(data){ me = u; localStorage.setItem("loggedInUser", u); await buildChatList(); showPage('pageList'); } else { alert("Invalid Credentials"); }
}

async function buildChatList() {
  const { data: allUsers } = await client.from('users').select('*');
  const listDiv = document.getElementById("userChatList");
  listDiv.innerHTML = "";
  allUsers.forEach(u => {
    userAvatars[u.username] = u.avatar_url || "https://via.placeholder.com/50";
    if(u.username !== me) {
      const item = document.createElement("div");
      item.className = "chat-item";
      item.onclick = () => openChat(u.username);
      item.innerHTML = `<div class="avatar-list" style="background-image: url('${userAvatars[u.username]}')"></div><div><div class="name-list">${u.username}</div><div class="msg-list">Tap to message</div></div>`;
      listDiv.appendChild(item);
    }
  });
}

async function openChat(name){
  other = name;
  document.getElementById("chattingWithName").innerText = name;
  document.getElementById("headerAvatar").style.backgroundImage = `url('${userAvatars[name]}')`;
  showPage('pageChatBox');
  loadMessages();
  realtime();
}

async function loadMessages(){
  const {data} = await client.from("messages").select("*").or(`and(sender.eq.${me},receiver.eq.${other}),and(sender.eq.${other},receiver.eq.${me})`).order("id", {ascending: true});
  const chatContent = document.getElementById("chatContent");
  chatContent.innerHTML = "";
  if(data) data.forEach(m => chatContent.appendChild(createMsgBubble(m)));
  chatContent.scrollTop = chatContent.scrollHeight;
}

function createMsgBubble(m) {
  let div = document.createElement("div");
  div.className = "msg-bubble " + (m.sender === me ? "out" : "");
  let html = `<div>${m.content || ''}</div>`;
  if (m.image) html += `<img src="${m.image}" class="chat-img" onclick="window.open('${m.image}')">`;
  if (m.audio) html += `<audio controls style="width:100%; filter:invert(1); height:30px; margin-top:5px;"><source src="${m.audio}"></audio>`;
  if (m.sender === me) html += `<span class="seen-tick">${m.seen ? '✔✔' : '✔'}</span>`;
  div.innerHTML = html;
  return div;
}

async function sendMessage(){
  let input = document.getElementById("messageInput");
  let val = input.value.trim();
  if(!val) return;
  await client.from("messages").insert([{ content: val, sender: me, receiver: other, seen: false }]);
  input.value = "";
}

async function uploadMedia(input) {
  const file = input.files[0];
  if (!file) return;
  const fileName = `${Date.now()}_${file.name}`;
  await client.storage.from('chat-media').upload(fileName, file);
  const { data } = client.storage.from('chat-media').getPublicUrl(fileName);
  const isImg = file.type.startsWith('image/');
  await client.from("messages").insert([{ sender: me, receiver: other, [isImg ? 'image' : 'audio']: data.publicUrl, content: "" }]);
  input.value = "";
}

async function updateProfile() {
    const avatarFile = document.getElementById("editAvatar").files[0];
    const newName = document.getElementById("editName").value.trim();
    const newPass = document.getElementById("editPass").value.trim();
    const originalMe = me;
    let updates = {};
    if(newName) updates.username = newName;
    if(newPass) updates.password = newPass;
    if(avatarFile) {
        const filePath = `avatars/${originalMe}_${Date.now()}.png`;
        await client.storage.from('chat-media').upload(filePath, avatarFile);
        const { data } = client.storage.from('chat-media').getPublicUrl(filePath);
        updates.avatar_url = data.publicUrl;
    }
    if(Object.keys(updates).length === 0) return alert("Nothing to update");
    const { error } = await client.from('users').update(updates).eq('username', originalMe);
    if(!error) {
        alert("Profile Updated!");
        if(newName) localStorage.setItem("loggedInUser", newName);
        location.reload();
    } else { alert("Error updating profile"); }
}

function realtime(){
  if(channel) client.removeChannel(channel);
  channel = client.channel("room").on("postgres_changes", {event: "INSERT", schema: "public", table: "messages"}, payload => {
    const m = payload.new;
    if((m.sender === me && m.receiver === other) || (m.sender === other && m.receiver === me)){
      document.getElementById("chatContent").appendChild(createMsgBubble(m));
      document.getElementById("chatContent").scrollTop = document.getElementById("chatContent").scrollHeight;
    }
  }).subscribe();
}

function showPage(id) {
  document.querySelectorAll('section').forEach(s => { 
    if(s.classList.contains('active')){ s.style.opacity="0"; setTimeout(()=> {s.classList.remove('active'); s.style.display="none";}, 400); }
  });
  setTimeout(() => { const t = document.getElementById(id); t.style.display="block"; t.offsetHeight; t.classList.add('active'); t.style.opacity="1"; }, 400);
}
function openSettings(){ document.getElementById("panel").classList.add("active"); document.getElementById("overlay").classList.add("active"); }
function closeSettings(){ document.getElementById("panel").classList.remove("active"); document.getElementById("overlay").classList.remove("active"); }
function logoutUser() { localStorage.clear(); location.reload(); }

window.onload = async () => {
  const savedUser = localStorage.getItem("loggedInUser");
  if(savedUser) { me = savedUser; await buildChatList(); showPage('pageList'); }
  for(let i=0;i<40;i++){
    let f=document.createElement("div"); f.className="flake"; f.style.left=Math.random()*100+"vw"; f.style.animationDuration=(5+Math.random()*5)+"s"; document.getElementById("snow").appendChild(f);
  }
};
</script>
</body>
</html>
