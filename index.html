<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Chat</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system;
}

body{
  background:#0b0d12;
  color:white;
  height:100dvh;
  display:flex;
  flex-direction:column;
}

/* HEADER */

#header{
  height:60px;
  display:flex;
  align-items:center;
  padding:0 15px;
  background:#111;
}

/* CHAT AREA */

#chatBox{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

/* MESSAGES */

.msg{display:flex;margin:8px 0;}
.left{justify-content:flex-start;}
.right{justify-content:flex-end;}

.bubble{
  padding:10px 14px;
  border-radius:18px;
  max-width:70%;
}

.left .bubble{background:#222;}
.right .bubble{background:#4f8cff;}

/* INPUT BAR */

#bottom{
  display:flex;
  padding:10px;
  gap:10px;
  background:#111;
}

#msgInput{
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
  background:#222;
  color:white;
}

#sendBtn{
  padding:10px 16px;
  border-radius:20px;
  border:none;
  background:#4f8cff;
  color:white;
}
</style>
</head>

<body>

<div id="header">Harvinder Chat</div>

<div id="chatBox"></div>

<div id="bottom">
  <input id="msgInput" placeholder="Message...">
  <button onclick="send()">Send</button>
</div>

<script>

const supabaseUrl="https://xtdmegkgzhyjqomhwfsk.supabase.co";
const supabaseKey="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0ZG1lZ2tnemh5anFvbWh3ZnNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTk0ODcsImV4cCI6MjA4OTU3NTQ4N30.ItvZpVxoYz4r_KZibnLmcxHLQ48UaGmfxiGOYZfOLbE";

const client=supabase.createClient(supabaseUrl,supabaseKey);

let me="Harvinder";
let other="Pooja";

/* SEND */
async function send(){
  const text=msgInput.value.trim();
  if(!text) return;

  await client.from("messages").insert([
    {content:text,sender:me,receiver:other}
  ]);

  msgInput.value="";
}

/* LOAD */
async function load(){
  const {data}=await client.from("messages").select("*");

  chatBox.innerHTML="";

  data.forEach(m=>{
    if(
      (m.sender===me && m.receiver===other) ||
      (m.sender===other && m.receiver===me)
    ){
      add(m);
    }
  });

  chatBox.scrollTop=chatBox.scrollHeight;
}

/* ADD */
function add(m){
  const div=document.createElement("div");
  div.className="msg "+(m.sender===me?"right":"left");
  div.innerHTML=`<div class="bubble">${m.content}</div>`;
  chatBox.appendChild(div);
}

/* REALTIME */
client.channel("chat")
.on("postgres_changes",{
  event:"INSERT",
  schema:"public",
  table:"messages"
},payload=>{
  const m=payload.new;

  if(
    (m.sender===me && m.receiver===other) ||
    (m.sender===other && m.receiver===me)
  ){
    add(m);
  }
}).subscribe();

load();

</script>

</body>
</html>
